# Production / full-stack profile: backend + frontend in Docker.
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Local dev: docker compose up -d  (postgres + redis only; run backend/frontend locally)

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    command: sh -c "npm run build && npm run start"
