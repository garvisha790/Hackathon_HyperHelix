<svg width="250" height="50" viewBox="0 0 250 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Icon -->
  <g transform="translate(4, 5)">
    <!-- Slanted White Bar (to contrast against dark background) -->
    <polygon points="12,4 2,36 12,36 22,4" fill="#FFFFFF" />
    
    <!-- Rupee symbol sitting in the negative space -->
    <text x="22" y="21" dominant-baseline="central" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="24" fill="#FFB347">₹</text>

    <!-- Slanted Mint Bar (Shifted right by 4px to give Rupee breathing room) -->
    <polygon points="32,16 24,36 34,36 42,16" fill="#6AD4B3" />
  </g>
  <!-- Wordmark -->
  <text x="54" y="34" font-family="'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF" letter-spacing="-0.5">
    taxodo<tspan fill="#6AD4B3" font-weight="700">.ai</tspan>
  </text>
</svg>
